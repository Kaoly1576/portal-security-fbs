<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aprovações de Acesso</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #050b16;
      color: #ffffff;
    }

    .topbar {
      background: linear-gradient(90deg, #ff6a00, #ff4d4f);
      padding: 18px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topbar .brand {
      display: flex;
      flex-direction: column;
    }

    .topbar h1 {
      font-size: 26px;
      font-weight: 800;
    }

    .topbar p {
      font-size: 13px;
      opacity: 0.95;
    }

    .topbar a {
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.22);
      padding: 10px 16px;
      border-radius: 10px;
    }

    .page {
      max-width: 1300px;
      margin: 0 auto;
      padding: 28px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(19,30,53,0.95), rgba(10,17,32,0.95));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 22px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }

    .hero h2 {
      font-size: 30px;
      margin-bottom: 8px;
    }

    .hero p {
      color: #b9c2d0;
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 14px;
      margin: 22px 0;
    }

    .stat-card {
      background: #111c33;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 18px;
    }

    .stat-label {
      font-size: 12px;
      color: #9fb0c9;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
    }

    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .filters input,
    .filters select {
      background: #0d1628;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px 14px;
      min-width: 220px;
      outline: none;
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      margin: 16px 0 14px;
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .user-card {
      background: linear-gradient(135deg, #15233d, #101a2d);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 18px;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 18px;
      align-items: center;
    }

    .user-main h3 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .user-main p {
      color: #b7c3d9;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .badge {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 700;
    }

    .badge.pending {
      background: rgba(255, 193, 7, 0.15);
      color: #ffd54f;
      border: 1px solid rgba(255, 213, 79, 0.25);
    }

    .badge.approved {
      background: rgba(46, 204, 113, 0.15);
      color: #7CFC8A;
      border: 1px solid rgba(124, 252, 138, 0.25);
    }

    .badge.rejected {
      background: rgba(255, 77, 79, 0.15);
      color: #ff8a8a;
      border: 1px solid rgba(255, 138, 138, 0.25);
    }

    .badge.role {
      background: rgba(62, 166, 255, 0.12);
      color: #7ec3ff;
      border: 1px solid rgba(126, 195, 255, 0.2);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: stretch;
    }

    .actions select {
      background: #0d1628;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 11px 12px;
      outline: none;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
    }

    .btn.approve {
      background: linear-gradient(90deg, #00b894, #00d084);
    }

    .btn.reject {
      background: linear-gradient(90deg, #ff4d4f, #ff6b6b);
    }

    .btn.update {
      background: linear-gradient(90deg, #3ea6ff, #2b7fff);
    }

    .empty {
      background: #111c33;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 20px;
      color: #b7c3d9;
    }

    @media (max-width: 900px) {
      .stats {
        grid-template-columns: repeat(2, minmax(150px, 1fr));
      }

      .user-card {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .stats {
        grid-template-columns: 1fr;
      }

      .topbar {
        padding: 16px;
      }

      .page {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>Portal Security FBS</h1>
      <p>Aprovações de acesso e gestão de usuários</p>
    </div>
    <a href="/portal">Voltar ao Portal</a>
  </header>

  <main class="page">
    <section class="hero">
      <h2>🔐 Aprovações de Acesso</h2>
      <p>Gerencie acessos pendentes, aprove usuários, defina perfis e acompanhe quem já está autorizado.</p>
    </section>

    <section class="stats">
      <div class="stat-card">
        <div class="stat-label">Pendentes</div>
        <div class="stat-value" id="statPendentes">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Aprovados</div>
        <div class="stat-value" id="statAprovados">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Rejeitados</div>
        <div class="stat-value" id="statRejeitados">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Usuários</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
    </section>

    <div class="filters">
      <input type="text" id="busca" placeholder="Buscar por nome ou e-mail..." />
      <select id="filtroStatus">
        <option value="">Todos os status</option>
        <option value="pendente">Pendente</option>
        <option value="aprovado">Aprovado</option>
        <option value="rejeitado">Rejeitado</option>
      </select>
      <select id="filtroPerfil">
        <option value="">Todos os perfis</option>
        <option value="usuario">Usuário</option>
        <option value="aprovador">Aprovador</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <h3 class="section-title">Usuários</h3>
    <section class="list" id="listaUsuarios"></section>
  </main>

  <script>
    let usuarios = [];
    let meuPerfil = "";

    async function carregarMe() {
      const res = await fetch("/api/me");
      const me = await res.json();
      meuPerfil = me.perfil || "";
    }

    async function carregarUsuarios() {
      const res = await fetch("/api/usuarios");
      usuarios = await res.json();
      renderizar();
    }

    function atualizarStats(lista) {
      document.getElementById("statPendentes").textContent =
        lista.filter(u => u.status === "pendente").length;

      document.getElementById("statAprovados").textContent =
        lista.filter(u => u.status === "aprovado").length;

      document.getElementById("statRejeitados").textContent =
        lista.filter(u => u.status === "rejeitado").length;

      document.getElementById("statTotal").textContent = lista.length;
    }

    function getListaFiltrada() {
      const busca = document.getElementById("busca").value.toLowerCase().trim();
      const filtroStatus = document.getElementById("filtroStatus").value;
      const filtroPerfil = document.getElementById("filtroPerfil").value;

      return usuarios.filter(u => {
        const okBusca =
          !busca ||
          (u.nome || "").toLowerCase().includes(busca) ||
          (u.email || "").toLowerCase().includes(busca);

        const okStatus = !filtroStatus || u.status === filtroStatus;
        const okPerfil = !filtroPerfil || u.perfil === filtroPerfil;

        return okBusca && okStatus && okPerfil;
      });
    }

    function badgeStatus(status) {
      if (status === "aprovado") return `<span class="badge approved">APROVADO</span>`;
      if (status === "rejeitado") return `<span class="badge rejected">REJEITADO</span>`;
      return `<span class="badge pending">PENDENTE</span>`;
    }

    function renderizar() {
      const lista = getListaFiltrada();
      atualizarStats(usuarios);

      const container = document.getElementById("listaUsuarios");

      if (!lista.length) {
        container.innerHTML = `<div class="empty">Nenhum usuário encontrado.</div>`;
        return;
      }

      container.innerHTML = lista.map(u => `
        <div class="user-card">
          <div class="user-main">
            <h3>${u.nome || "Usuário sem nome"}</h3>
            <p><strong>Email:</strong> ${u.email || "-"}</p>
            <p><strong>ID:</strong> ${u.id}</p>
            <div class="badges">
              ${badgeStatus(u.status)}
              <span class="badge role">PERFIL: ${(u.perfil || "usuario").toUpperCase()}</span>
            </div>
          </div>

          <div class="actions">
            <select id="perfil-${u.id}">
              <option value="usuario" ${u.perfil === "usuario" ? "selected" : ""}>Usuário</option>
              <option value="aprovador" ${u.perfil === "aprovador" ? "selected" : ""}>Aprovador</option>
              ${meuPerfil === "admin" ? `<option value="admin" ${u.perfil === "admin" ? "selected" : ""}>Admin</option>` : ""}
            </select>

            <div class="btn-row">
              <button class="btn approve" onclick="aprovarUsuario(${u.id})">Aprovar</button>
              <button class="btn reject" onclick="rejeitarUsuario(${u.id})">Rejeitar</button>
              ${meuPerfil === "admin" ? `<button class="btn update" onclick="atualizarPerfil(${u.id})">Salvar Perfil</button>` : ""}
            </div>
          </div>
        </div>
      `).join("");
    }

    async function aprovarUsuario(id) {
      const perfil = document.getElementById(`perfil-${id}`).value;

      const res = await fetch(`/aprovar/${id}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ perfil })
      });

      if (!res.ok) {
        alert("Erro ao aprovar usuário.");
        return;
      }

      await carregarUsuarios();
    }

    async function rejeitarUsuario(id) {
      const res = await fetch(`/rejeitar/${id}`, {
        method: "POST"
      });

      if (!res.ok) {
        alert("Erro ao rejeitar usuário.");
        return;
      }

      await carregarUsuarios();
    }

    async function atualizarPerfil(id) {
      const perfil = document.getElementById(`perfil-${id}`).value;

      const res = await fetch(`/usuarios/perfil/${id}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ perfil })
      });

      if (!res.ok) {
        alert("Erro ao atualizar perfil.");
        return;
      }

      await carregarUsuarios();
    }

    document.getElementById("busca").addEventListener("input", renderizar);
    document.getElementById("filtroStatus").addEventListener("change", renderizar);
    document.getElementById("filtroPerfil").addEventListener("change", renderizar);

    async function iniciar() {
      await carregarMe();
      await carregarUsuarios();
    }

    iniciar();
  </script>
</body>
</html>
