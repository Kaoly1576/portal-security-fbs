<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>AV LOST Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.header {
  background: linear-gradient(90deg, #1e293b, #0f172a);
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

/* filtros */
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 20px;
}

select, input {
  padding: 10px;
  background: #020617;
  border: 1px solid #334155;
  color: white;
  border-radius: 6px;
}

/* cards */
.cards {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.card {
  background: #1e293b;
  padding: 10px;
  text-align: center;
  border-radius: 8px;
}

.card span {
  color: orange;
  font-size: 18px;
  font-weight: bold;
}

/* gráficos */
.chart-box {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="header">📊 AV LOST Dashboard</div>

<div class="container">

  <!-- filtros -->
  <div class="filters">
    <select id="filtroUnidade" multiple></select>
    <select id="filtroStatus" multiple></select>
    <input type="text" id="busca" placeholder="Buscar...">
  </div>

  <!-- cards por dia -->
  <div class="cards" id="cardsDias"></div>

  <!-- gráficos -->
  <div class="chart-box">
    <canvas id="graficoMotivos"></canvas>
  </div>

  <div class="chart-box">
    <canvas id="graficoUnidade"></canvas>
  </div>

</div>

<script>
let dados = [];

async function carregar() {
  const res = await fetch("/api/dados");
  dados = await res.json();

  popularFiltros();
  atualizar();
}

function unique(field) {
  return [...new Set(dados.map(d => d[field]).filter(Boolean))];
}

function popularFiltros() {
  preencherSelect("filtroUnidade", unique("Unidade"));
  preencherSelect("filtroStatus", unique("Status"));
}

function preencherSelect(id, valores) {
  const el = document.getElementById(id);
  valores.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    el.appendChild(opt);
  });
}

function getSelecionados(id) {
  return [...document.getElementById(id).selectedOptions].map(o => o.value);
}

function filtrar() {
  let filtrado = [...dados];

  const unidade = getSelecionados("filtroUnidade");
  const status = getSelecionados("filtroStatus");
  const busca = document.getElementById("busca").value.toLowerCase();

  if (unidade.length)
    filtrado = filtrado.filter(d => unidade.includes(d.Unidade));

  if (status.length)
    filtrado = filtrado.filter(d => status.includes(d.Status));

  if (busca)
    filtrado = filtrado.filter(d =>
      JSON.stringify(d).toLowerCase().includes(busca)
    );

  return filtrado;
}

function contarPorCampo(lista, campo) {
  const contagem = {};

  lista.forEach(d => {
    const val = d[campo] || "N/A";
    contagem[val] = (contagem[val] || 0) + 1;
  });

  return Object.entries(contagem)
    .sort((a, b) => b[1] - a[1]);
}

function gerarCards(lista) {
  const dias = Array(31).fill(0);

  lista.forEach(d => {
    if (d._DATA_OBJ) {
      const dia = new Date(d._DATA_OBJ).getDate();
      dias[dia - 1]++;
    }
  });

  const container = document.getElementById("cardsDias");
  container.innerHTML = "";

  dias.forEach((qtd, i) => {
    container.innerHTML += `
      <div class="card">
        Dia ${i + 1}<br>
        <span>${qtd}</span>
      </div>
    `;
  });
}

let grafico1, grafico2;

function gerarGrafico(id, dados, labelCampo) {
  const labels = dados.map(d => d[0]);
  const valores = dados.map(d => d[1]);

  return new Chart(document.getElementById(id), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: labelCampo,
        data: valores,
        backgroundColor: "orange"
      }]
    },
    options: {
      plugins: {
        legend: { display: false }
      },
      scales: {
        x: { ticks: { color: "white" } },
        y: { ticks: { color: "white" } }
      }
    }
  });
}

function atualizar() {
  const lista = filtrar();

  gerarCards(lista);

  const motivos = contarPorCampo(lista, "Motivo");
  const unidade = contarPorCampo(lista, "Unidade");

  if (grafico1) grafico1.destroy();
  if (grafico2) grafico2.destroy();

  grafico1 = gerarGrafico("graficoMotivos", motivos, "Motivos");
  grafico2 = gerarGrafico("graficoUnidade", unidade, "Unidades");
}

/* eventos */
document.querySelectorAll("select, input").forEach(el => {
  el.addEventListener("change", atualizar);
  el.addEventListener("keyup", atualizar);
});

carregar();
</script>

</body>
</html>
