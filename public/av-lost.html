<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AV-LOST Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ================== RESET ================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* ================== BODY ================== */
body {
  background: #0f172a;
  color: #e2e8f0;
}

/* ================== HEADER ================== */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #020617;
  padding: 15px 25px;
  border-bottom: 2px solid #1e293b;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-left img {
  height: 40px;
}

.header-title {
  font-size: 20px;
  font-weight: bold;
  color: #38bdf8;
}

.btn-voltar {
  background: #ef4444;
  border: none;
  padding: 8px 14px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.btn-voltar:hover {
  background: #dc2626;
}

/* ================== FILTROS ================== */
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  padding: 15px 25px;
}

select {
  background: #020617;
  color: #fff;
  border: 1px solid #334155;
  padding: 8px;
  border-radius: 6px;
  min-width: 150px;
}

/* ================== GRID ================== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* ================== CARDS ================== */
.card {
  background: #020617;
  padding: 15px;
  border-radius: 12px;
  border: 1px solid #1e293b;
}

.card h3 {
  margin-bottom: 10px;
  font-size: 16px;
  color: #38bdf8;
}

/* ================== KPI ================== */
.kpi {
  font-size: 28px;
  font-weight: bold;
}

/* ================== FOOTER ================== */
footer {
  text-align: center;
  padding: 10px;
  color: #64748b;
}
</style>
</head>

<body>

<header>
  <div class="header-left">
    <img src="/images/logo.png">
    <div class="header-title">AV-LOST Dashboard</div>
  </div>

  <button class="btn-voltar" onclick="voltar()">Voltar ao Portal</button>
</header>

<!-- ================== FILTROS ================== -->
<div class="filters">
  <select id="filtroUnidade" multiple></select>
  <select id="filtroStatus" multiple></select>
  <select id="filtroColaborador" multiple></select>
</div>

<!-- ================== GRID ================== -->
<div class="grid">

  <div class="card">
    <h3>Total AV-LOST</h3>
    <div id="total" class="kpi">0</div>
  </div>

  <div class="card">
    <h3>Por Status</h3>
    <canvas id="statusChart"></canvas>
  </div>

  <div class="card">
    <h3>Por Unidade</h3>
    <canvas id="unidadeChart"></canvas>
  </div>

  <div class="card">
    <h3>Por Dia do Mês</h3>
    <canvas id="diaChart"></canvas>
  </div>

</div>

<footer>
  AV-LOST © 2026
</footer>

<script>

/* ================== VARIÁVEIS ================== */
let dadosOriginais = [];
let dadosFiltrados = [];

let statusChart, unidadeChart, diaChart;

/* ================== VOLTAR ================== */
function voltar() {
  window.location.href = "/portal";
}

/* ================== FETCH ================== */
async function carregarDados() {
  const res = await fetch("/api/dados");
  dadosOriginais = await res.json();

  dadosFiltrados = [...dadosOriginais];

  popularFiltros();
  atualizarDashboard();
}

/* ================== FILTROS ================== */
function popularFiltros() {

  const unidade = [...new Set(dadosOriginais.map(d => d["UNIDADE"]))];
  const status = [...new Set(dadosOriginais.map(d => d["STATUS"]))];
  const colaborador = [...new Set(dadosOriginais.map(d => d["COLABORADOR"]))];

  preencherSelect("filtroUnidade", unidade);
  preencherSelect("filtroStatus", status);
  preencherSelect("filtroColaborador", colaborador);
}

function preencherSelect(id, valores) {
  const select = document.getElementById(id);
  select.innerHTML = "";

  valores.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    select.appendChild(opt);
  });

  select.addEventListener("change", aplicarFiltros);
}

/* ================== APLICAR FILTROS ================== */
function aplicarFiltros() {

  const unidade = getSelected("filtroUnidade");
  const status = getSelected("filtroStatus");
  const colab = getSelected("filtroColaborador");

  dadosFiltrados = dadosOriginais.filter(d => {

    return (
      (unidade.length === 0 || unidade.includes(d["UNIDADE"])) &&
      (status.length === 0 || status.includes(d["STATUS"])) &&
      (colab.length === 0 || colab.includes(d["COLABORADOR"]))
    );

  });

  atualizarDashboard();
}

function getSelected(id) {
  return [...document.getElementById(id).selectedOptions].map(o => o.value);
}

/* ================== DASHBOARD ================== */
function atualizarDashboard() {

  document.getElementById("total").textContent = dadosFiltrados.length;

  gerarStatus();
  gerarUnidade();
  gerarDia();
}

/* ================== STATUS ================== */
function gerarStatus() {

  const contagem = {};

  dadosFiltrados.forEach(d => {
    contagem[d["STATUS"]] = (contagem[d["STATUS"]] || 0) + 1;
  });

  const labels = Object.keys(contagem);
  const valores = Object.values(contagem);

  if (statusChart) statusChart.destroy();

  statusChart = new Chart(document.getElementById("statusChart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Status",
        data: valores
      }]
    }
  });
}

/* ================== UNIDADE ================== */
function gerarUnidade() {

  const contagem = {};

  dadosFiltrados.forEach(d => {
    contagem[d["UNIDADE"]] = (contagem[d["UNIDADE"]] || 0) + 1;
  });

  if (unidadeChart) unidadeChart.destroy();

  unidadeChart = new Chart(document.getElementById("unidadeChart"), {
    type: "bar",
    data: {
      labels: Object.keys(contagem),
      datasets: [{
        label: "Unidade",
        data: Object.values(contagem)
      }]
    }
  });
}

/* ================== DIA ================== */
function gerarDia() {

  const dias = Array(31).fill(0);

  dadosFiltrados.forEach(d => {
    const data = d["DATA"] || "";
    const dia = new Date(data).getDate();

    if (dia) dias[dia - 1]++;
  });

  if (diaChart) diaChart.destroy();

  diaChart = new Chart(document.getElementById("diaChart"), {
    type: "line",
    data: {
      labels: [...Array(31).keys()].map(d => d + 1),
      datasets: [{
        label: "Ocorrências por dia",
        data: dias
      }]
    }
  });
}

/* ================== INIT ================== */
carregarDados();

</script>

</body>
</html>
