<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Checklist Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #1e272e;
  color: white;
}

.topbar {
  background: #ee4d2d;
  padding: 15px;
  font-size: 20px;
}

.container {
  padding: 20px;
}

.cards {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.card {
  background: #2f3640;
  padding: 20px;
  flex: 1;
  border-radius: 10px;
}

.graficos {
  display: flex;
  gap: 20px;
}

canvas {
  background: #2f3640;
  padding: 10px;
  border-radius: 10px;
}

</style>
</head>

<body>

<div class="topbar">📋 Dashboard Checklist</div>

<div class="container">

<div class="cards">
  <div class="card">
    <h3>Total Checklists</h3>
    <span id="kpiChecklists">0</span>
  </div>

  <div class="card">
    <h3>Total Perguntas</h3>
    <span id="kpiPerguntas">0</span>
  </div>

  <div class="card">
    <h3>% Conformidade</h3>
    <span id="kpiConformidade">0%</span>
  </div>
</div>

<div class="graficos">
  <canvas id="grafProcesso"></canvas>
  <canvas id="grafDia"></canvas>
</div>

</div>

<script>

async function carregar() {

  const resumo = await fetch("/api/checklist-resumo").then(r => r.json());

  document.getElementById("kpiChecklists").innerText = resumo.totalChecklists;
  document.getElementById("kpiPerguntas").innerText = resumo.totalPerguntas;
  document.getElementById("kpiConformidade").innerText = resumo.percConformidade + "%";

  const graficos = await fetch("/api/checklist-graficos").then(r => r.json());

  new Chart(document.getElementById("grafProcesso"), {
    type: "bar",
    data: {
      labels: graficos.processo.labels,
      datasets: [{
        label: "Não Conformidades",
        data: graficos.processo.valores
      }]
    }
  });

  new Chart(document.getElementById("grafDia"), {
    type: "line",
    data: {
      labels: Array.from({length: 31}, (_, i) => i + 1),
      datasets: [{
        label: "Checklists por Dia",
        data: graficos.porDia
      }]
    }
  });

}

carregar();

</script>

</body>
</html>
