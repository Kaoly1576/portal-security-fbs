<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security FBS Portal</title>

<link rel="stylesheet" href="/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.container {
  padding: 20px;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 40px;
}

.menu {
  display: flex;
  gap: 25px;
  font-size: 14px;
  opacity: 0.8;
}

.menu a {
  color: white;
  text-decoration: none;
}

/* HERO */
.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 30px;
}

.hero h1 {
  font-size: 32px;
}

.hero img {
  width: 280px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-top: 30px;
}

.card {
  background: #0f172a;
  padding: 15px;
  border-radius: 12px;
}

.card h3 {
  font-size: 14px;
  opacity: 0.7;
}

.card span {
  font-size: 28px;
  color: #ff7a1a;
}

/* GRID MAIN */
.main {
  display: grid;
  grid-template-columns: 3fr 1fr;
  gap: 20px;
  margin-top: 30px;
}

/* MONITOR */
.monitor {
  background: #0f172a;
  padding: 20px;
  border-radius: 12px;
}

.right-panel {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.panel {
  background: #0f172a;
  padding: 15px;
  border-radius: 12px;
}

/* TABLE */
.table {
  margin-top: 20px;
  background: #0f172a;
  padding: 15px;
  border-radius: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.btn {
  background: #ff7a1a;
  border: none;
  padding: 5px 10px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <img src="/images/logo.png">
    <b>Shopee Security</b>
  </div>

  <div class="menu">
    <a href="/portal">Dashboard</a>
    <a href="/access">Controle de Acesso</a>
    <a href="/cco-fbs">CCO FBS</a>
    <a href="/aprovacoes">Aprovações</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>Bem-vindo ao Security FBS</h1>
    <p>Monitoramento de acessos e segurança em tempo real</p>
  </div>

  <img src="/images/logo.png">
</div>

<!-- CARDS -->
<div class="cards">
  <div class="card">
    <h3>Aprovados Hoje</h3>
    <span id="aprovados">0</span>
  </div>

  <div class="card">
    <h3>Pendentes</h3>
    <span id="pendentes">0</span>
  </div>

  <div class="card">
    <h3>Bloqueados</h3>
    <span id="bloqueados">0</span>
  </div>

  <div class="card">
    <h3>Total Acessos</h3>
    <span id="total">0</span>
  </div>
</div>

<!-- MAIN GRID -->
<div class="main">

  <!-- MONITOR -->
  <div>
    <div class="monitor">
      <h3>Monitoramento em Tempo Real</h3>
      <canvas id="grafico"></canvas>
    </div>

    <!-- TABELA -->
    <div class="table">
      <h3>Solicitações Recentes</h3>
      <table id="tabela"></table>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">

    <div class="panel">
      <h3>Usuário</h3>
      <div id="usuario"></div>
    </div>

    <div class="panel">
      <h3>Ações Rápidas</h3>
      <button class="btn" onclick="location.href='/aprovacoes'">Aprovar</button>
      <button class="btn" onclick="location.href='/access'">Ver acessos</button>
    </div>

    <div class="panel">
      <h3>Dashboards</h3>
      <button class="btn" onclick="location.href='/access'">ACCESS</button>
      <button class="btn" onclick="location.href='/cco-fbs'">CCO</button>
    </div>

  </div>

</div>

</div>

<script>
let chart;

/* =========================
   CARREGAR USUÁRIO
========================= */
async function loadUser() {
  const res = await fetch("/api/me");
  const user = await res.json();

  document.getElementById("usuario").innerHTML = `
    <b>${user.nome}</b><br>
    ${user.perfil}
  `;
}

/* =========================
   CARREGAR ACCESS (BASE REAL)
========================= */
async function loadData() {
  const res = await fetch("/api/access-dados");
  const data = await res.json();

  const aprovados = data.filter(x => (x.Status || "").toLowerCase() === "aprovado").length;
  const bloqueados = data.filter(x => (x.Status || "").toLowerCase() === "reprovado").length;
  const total = data.length;

  document.getElementById("aprovados").textContent = aprovados;
  document.getElementById("bloqueados").textContent = bloqueados;
  document.getElementById("total").textContent = total;
  document.getElementById("pendentes").textContent = total - aprovados - bloqueados;

  renderChart(data);
  renderTable(data);
}

/* =========================
   GRÁFICO TEMPO REAL
========================= */
function renderChart(data) {

  const map = {};

  data.forEach(row => {
    const d = row["Data"];
    if (!d) return;

    map[d] = (map[d] || 0) + 1;
  });

  const labels = Object.keys(map).slice(-10);
  const values = labels.map(l => map[l]);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("grafico"), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Acessos",
        data: values,
        borderColor: "#ff7a1a",
        fill: true
      }]
    }
  });
}

/* =========================
   TABELA
========================= */
function renderTable(data) {

  let html = "<tr><th>Nome</th><th>Empresa</th><th>Status</th></tr>";

  data.slice(0,10).forEach(r => {
    html += `
      <tr>
        <td>${r["Nome completo:"] || ""}</td>
        <td>${r["Empresa"] || ""}</td>
        <td>${r["Status"] || ""}</td>
      </tr>
    `;
  });

  document.getElementById("tabela").innerHTML = html;
}

/* INIT */
loadUser();
loadData();

</script>

</body>
</html>
