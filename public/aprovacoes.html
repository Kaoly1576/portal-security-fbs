<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aprovações</title>
  <link rel="stylesheet" href="/portal.css" />
  <style>
    .aprovacoes-wrap {
      max-width: 1100px;
      margin: 30px auto;
      padding: 20px;
    }

    .aprovacoes-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .aprovacoes-title {
      font-size: 28px;
      font-weight: 800;
      color: #ff7a1a;
    }

    .aprovacoes-lista {
      display: grid;
      gap: 16px;
    }

    .aprovacao-card {
      background: linear-gradient(135deg, #1c2a45 0%, #13213a 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 18px;
      color: #fff;
    }

    .aprovacao-nome {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .aprovacao-email {
      color: #d1d5db;
      margin-bottom: 14px;
    }

    .aprovacao-btn {
      background: linear-gradient(90deg, #ff7a1a 0%, #ff4d4d 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .voltar-btn {
      display: inline-block;
      background: #1c2a45;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 14px;
    }

    .vazio {
      background: linear-gradient(135deg, #1c2a45 0%, #13213a 100%);
      border-radius: 20px;
      padding: 20px;
      color: #d1d5db;
    }
  </style>
</head>
<body>
  <div class="aprovacoes-wrap">
    <div class="aprovacoes-header">
      <div class="aprovacoes-title">Painel de Aprovações</div>
      <a href="/portal" class="voltar-btn">Voltar ao portal</a>
    </div>

    <div id="listaPendentes" class="aprovacoes-lista"></div>
  </div>

  <script>
    async function carregarPendentes() {
      const container = document.getElementById("listaPendentes");
      container.innerHTML = "<div class='vazio'>Carregando...</div>";

      try {
        const res = await fetch("/api/aprovacoes/pendentes", {
          credentials: "same-origin"
        });

        const users = await res.json();

        if (!Array.isArray(users) || users.length === 0) {
          container.innerHTML = "<div class='vazio'>Nenhum usuário pendente.</div>";
          return;
        }

        container.innerHTML = users.map(user => `
          <div class="aprovacao-card">
            <div class="aprovacao-nome">${user.nome || "Sem nome"}</div>
            <div class="aprovacao-email">${user.email || "-"}</div>
            <button class="aprovacao-btn" onclick="aprovarUsuario(${user.id})">Aprovar</button>
          </div>
        `).join("");
      } catch (error) {
        console.error(error);
        container.innerHTML = "<div class='vazio'>Erro ao carregar usuários pendentes.</div>";
      }
    }

    async function aprovarUsuario(id) {
      try {
        const res = await fetch(`/api/aprovacoes/aprovar/${id}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          credentials: "same-origin"
        });

        const result = await res.json();

        if (result.success) {
          carregarPendentes();
        } else {
          alert("Não foi possível aprovar o usuário.");
        }
      } catch (error) {
        console.error(error);
        alert("Erro ao aprovar usuário.");
      }
    }

    carregarPendentes();
  </script>
</body>
</html>
