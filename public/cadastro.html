<!DOCTYPE html>
<html>
<head>
    <title>Cadastro - Sistema Interno</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #ee4d2d;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #d84326;
        }

        a {
            display: block;
            margin-top: 15px;
            font-size: 14px;
            text-decoration: none;
            color: #ee4d2d;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Solicitar Acesso</h2>

    <form action="/cadastro" method="POST">
        <input type="text" name="nome" placeholder="Nome completo" required>
        <input type="email" name="email" placeholder="Email @shopee.com" required>
        <input type="password" name="senha" placeholder="Senha" required>
        <button type="submit">Cadastrar</button>
    </form>

    <a href="index.html">Voltar ao login</a>
</div>

</body>
</html>
