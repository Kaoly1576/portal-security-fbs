<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CCO FBS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="/access.css" />

<style>
/* AJUSTES PARA LAYOUT BI */
.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  margin-top: 20px;
}

.panel {
  background: #16263f;
  border-radius: 14px;
  padding: 16px;
}

.panel h3 {
  margin-bottom: 10px;
  color: #ff7a1a;
  font-size: 14px;
}

.table-mini {
  width: 100%;
  font-size: 12px;
}

.table-mini td {
  padding: 6px 4px;
}

.bar {
  height: 8px;
  background: #ff7a1a;
  border-radius: 4px;
}

.chart-wrap {
  height: 220px;
}
</style>

</head>

<body>
<div class="page-shell">

<header class="topbar">
  <div class="brand">
    <img src="/images/logo.png" class="brand-logo"/>
    <div>
      <h1>CCO FBS</h1>
      <p>Dashboard operacional</p>
    </div>
  </div>

  <a href="/portal" class="btn-secondary">Voltar</a>
</header>

<!-- FILTROS -->
<section class="filters-card">
  <div class="filters-grid">

    <input type="date" id="dataInicio">
    <input type="date" id="dataFim">
    <input type="text" id="busca" placeholder="Busca geral">

    <div id="dynamicFilters"></div>

    <button class="btn-primary" onclick="applyFilters()">Aplicar</button>

  </div>
</section>

<!-- LINHA 1 -->
<div class="grid-3">

  <div class="panel">
    <h3 id="titulo1"></h3>
    <table class="table-mini" id="table1"></table>
  </div>

  <div class="panel">
    <h3 id="titulo2"></h3>
    <table class="table-mini" id="table2"></table>
  </div>

  <div class="panel">
    <h3>Status</h3>
    <div class="chart-wrap">
      <canvas id="chartStatus"></canvas>
    </div>
  </div>

</div>

<!-- LINHA 2 -->
<div class="grid-3">

  <div class="panel">
    <h3>Distribuição</h3>
    <div class="chart-wrap">
      <canvas id="chart1"></canvas>
    </div>
  </div>

  <div class="panel">
    <h3>Distribuição 2</h3>
    <div class="chart-wrap">
      <canvas id="chart2"></canvas>
    </div>
  </div>

  <div class="panel">
    <h3>Por Dia</h3>
    <div class="chart-wrap">
      <canvas id="chartDia"></canvas>
    </div>
  </div>

</div>

</div>

<script>

let filtrosConfig = [];

function format(n){
  return new Intl.NumberFormat("pt-BR").format(n || 0);
}

function getParams(){
  const p = new URLSearchParams();

  p.append("dataInicio", document.getElementById("dataInicio").value);
  p.append("dataFim", document.getElementById("dataFim").value);
  p.append("busca", document.getElementById("busca").value);

  filtrosConfig.forEach(f=>{
    const select = document.getElementById("f_"+f.key);
    const values = [...select.selectedOptions].map(o=>o.value);
    if(values.length){
      p.append("f_"+f.key, values.join("|"));
    }
  });

  return p;
}

async function loadFiltros(){
  const res = await fetch("/api/cco-fbs-filtros");
  const data = await res.json();

  filtrosConfig = data.filtros;

  const div = document.getElementById("dynamicFilters");
  div.innerHTML = "";

  data.filtros.forEach(f=>{
    const select = document.createElement("select");
    select.id = "f_"+f.key;
    select.multiple = true;

    f.values.forEach(v=>{
      const opt = document.createElement("option");
      opt.value = v;
      opt.textContent = v;
      select.appendChild(opt);
    });

    div.appendChild(select);
  });
}

function renderTable(el, data){
  const max = Math.max(...data.map(x=>x.total));

  el.innerHTML = data.map(r=>`
    <tr>
      <td>${r.nome}</td>
      <td>${format(r.total)}</td>
      <td style="width:100%">
        <div class="bar" style="width:${(r.total/max)*100}%"></div>
      </td>
    </tr>
  `).join("");
}

async function loadGraficos(){

  const res = await fetch(`/api/cco-fbs-graficos?${getParams()}`);
  const data = await res.json();

  document.getElementById("titulo1").textContent = data.tableAHeader;
  document.getElementById("titulo2").textContent = data.tableBHeader;

  renderTable(document.getElementById("table1"), data.tableA);
  renderTable(document.getElementById("table2"), data.tableB);

  const c1 = data.charts[0];
  const c2 = data.charts[1];

  new Chart(chart1, {
    type: "bar",
    data: { labels: c1.labels, datasets:[{data:c1.values}] }
  });

  new Chart(chart2, {
    type: "bar",
    data: { labels: c2.labels, datasets:[{data:c2.values}] }
  });

  new Chart(chartStatus, {
    type: "doughnut",
    data: { labels: c1.labels, datasets:[{data:c1.values}] }
  });

  new Chart(chartDia, {
    type: "line",
    data: {
      labels: data.porDia.labels,
      datasets:[{data:data.porDia.values}]
    }
  });

}

function applyFilters(){
  loadGraficos();
}

async function init(){
  await loadFiltros();
  await loadGraficos();
}

init();

</script>
</body>
</html>
