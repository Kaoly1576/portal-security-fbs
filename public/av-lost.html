<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AV LOST Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
body{
  background:#0b1220;
  color:#fff;
  font-family:Arial;
}

.container{
  padding:16px;
}

/* KPIs */
.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:12px;
}

.kpi{
  background:#111827;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.08);
}

.kpi-title{
  font-size:11px;
  color:#9ca3af;
}

.kpi-value{
  font-size:26px;
  color:#ff7a1a;
  font-weight:800;
}

.kpi-sub{
  font-size:12px;
  font-weight:700;
}

.positive{ color:#22c55e;}
.negative{ color:#f87171;}

/* charts */
.grid-top{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.card{
  background:#111827;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.08);
}

.chart{
  height:220px;
}

.center{
  display:flex;
  justify-content:center;
}

.big{
  width:500px;
}

.line{
  height:260px;
  margin-top:10px;
}

@media(max-width:1200px){
  .grid-top{
    grid-template-columns:1fr;
  }
  .kpis{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>
<div class="container">

<!-- KPIs -->
<div class="kpis">
  <div class="kpi">
    <div class="kpi-title">TOTAL REGISTROS</div>
    <div class="kpi-value" id="kpiTotal"></div>
    <div id="varTotal" class="kpi-sub"></div>
  </div>

  <div class="kpi">
    <div class="kpi-title">AV ENCONTRADO</div>
    <div class="kpi-value" id="kpiAv"></div>
    <div id="varAv" class="kpi-sub"></div>
  </div>

  <div class="kpi">
    <div class="kpi-title">US$ ENCONTRADO</div>
    <div class="kpi-value" id="kpiUsd"></div>
    <div id="varUsd" class="kpi-sub"></div>
  </div>

  <div class="kpi">
    <div class="kpi-title">R$ ENCONTRADO</div>
    <div class="kpi-value" id="kpiBrl"></div>
    <div id="varBrl" class="kpi-sub"></div>
  </div>
</div>

<!-- TOP -->
<div class="grid-top">

  <div class="card">
    <h4>Ocorrências por Unidade</h4>
    <canvas id="chartUnidade" class="chart"></canvas>
  </div>

  <div class="card">
    <h4>% de AV por Colaborador</h4>
    <canvas id="chartColaborador" class="chart"></canvas>
  </div>

  <div class="card">
    <h4>Resumo por Status</h4>
    <canvas id="chartStatus" class="chart"></canvas>
  </div>

</div>

<!-- VALIDAÇÃO -->
<div class="center">
  <div class="card big">
    <h4>Validação por Colaborador</h4>
    <canvas id="chartValidacao"></canvas>
  </div>
</div>

<!-- DIA -->
<div class="card line">
  <h4>Encontrados por Dia</h4>
  <canvas id="chartDia"></canvas>
</div>

</div>

<script>
let raw=[];

function parse(v){
  return Number(String(v).replace(/[^\d.-]/g,''))||0;
}

function format(n){
  return n.toLocaleString('pt-BR');
}

function moneyBRL(n){
  return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

function moneyUSD(n){
  return n.toLocaleString('en-US',{style:'currency',currency:'USD'});
}

function group(data,field,metric){
  const map={};
  data.forEach(r=>{
    const k=r[field]||'Sem valor';
    map[k]=(map[k]||0)+(metric?parse(r[metric]):1);
  });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]);
}

function calcKPIs(data){
  const total=data.length;
  const av=data.reduce((s,r)=>s+parse(r['AV - LOST']),0);
  const usd=data.reduce((s,r)=>s+parse(r['US$ ENCONTRADO']),0);
  const brl=data.reduce((s,r)=>s+parse(r['R$ ENCONTRADO']),0);

  document.getElementById('kpiTotal').innerText=format(total);
  document.getElementById('kpiAv').innerText=format(av);
  document.getElementById('kpiUsd').innerText=moneyUSD(usd);
  document.getElementById('kpiBrl').innerText=moneyBRL(brl);
}

function renderCharts(data){

  const unidade=group(data,'UNIDADE','AV - LOST').slice(0,8);
  new Chart(chartUnidade,{
    type:'bar',
    data:{
      labels:unidade.map(x=>x[0]),
      datasets:[{data:unidade.map(x=>x[1]),backgroundColor:'#ff7a1a'}]
    },
    options:{indexAxis:'y'}
  });

  const colab=group(data,'PROBLEM SOLVER LP','AV - LOST').slice(0,8);
  new Chart(chartColaborador,{
    type:'doughnut',
    data:{
      labels:colab.map(x=>x[0]),
      datasets:[{
        data:colab.map(x=>x[1]),
        backgroundColor:[
          "#ff6a00","#ff7a1a","#ff8c33","#ff9f52",
          "#ffb06b","#ffc287","#ffd2a3","#ffe3c7"
        ]
      }]
    }
  });

  const status=group(data,'STATUS RETORNO').slice(0,8);
  new Chart(chartStatus,{
    type:'bar',
    data:{
      labels:status.map(x=>x[0]),
      datasets:[{data:status.map(x=>x[1]),backgroundColor:'#ff7a1a'}]
    },
    options:{indexAxis:'y'}
  });

  const valid=group(data,'PROBLEM SOLVER LP','QUANTIDADE ENCONTRADA').slice(0,6);

  new Chart(chartValidacao,{
    type:'bar',
    data:{
      labels:valid.map(x=>x[0]),
      datasets:[
        {label:'Qtd Validada',data:valid.map(x=>x[1]),backgroundColor:'#60a5fa'},
        {label:'AV',data:valid.map(x=>parse(x[1]/2)),backgroundColor:'#ff7a1a'}
      ]
    },
    options:{indexAxis:'y'}
  });

  const days=[...Array(31).keys()].map(x=>x+1);
  const map={}; days.forEach(d=>map[d]=0);

  data.forEach(r=>{
    const d=r.DATA?.split('/')[0];
    map[d]=(map[d]||0)+parse(r['AV - LOST']);
  });

  new Chart(chartDia,{
    type:'line',
    data:{
      labels:days,
      datasets:[{
        data:days.map(d=>map[d]||0),
        borderColor:'#60a5fa'
      }]
    }
  });

}

async function load(){
  const res=await fetch('/api/dados');
  raw=await res.json();

  raw=raw.map(r=>{
    const obj={};
    Object.keys(r).forEach(k=>{
      if(!k.includes('Unnamed')) obj[k]=r[k];
    });
    return obj;
  });

  calcKPIs(raw);
  renderCharts(raw);
}

load();
</script>

</body>
</html>
